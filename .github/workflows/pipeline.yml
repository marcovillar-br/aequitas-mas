name: "AQM Multi-Account Infrastructure"

on:
  push:
    branches:
      - development
      - "feat/*"
      - "fix/*"
  pull_request:
    branches:
      - development

permissions:
  id-token: write # Mandatory for OIDC authentication
  contents: read  # Mandatory for checkout

jobs:
  terraform:
    name: "Terraform Execution"
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-dev
      cancel-in-progress: false
    
    env:
      # Sincronização global de região (mapeia para var.AQM_REGION)
      TF_VAR_AQM_REGION: "us-east-1"
      DEV_ACCOUNT: "355316257214"

    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Determine Target Account and Workspace based on Context
      - name: Set Environment Context
        id: context
        run: |
          # Development stage: always execute terraform checks in DEV account/workspace.
          echo "ACCOUNT_ID=${{ env.DEV_ACCOUNT }}" >> $GITHUB_OUTPUT
          echo "WORKSPACE=dev" >> $GITHUB_OUTPUT

      # 2. Authenticate to AWS via OIDC (Zero Trust)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.context.outputs.ACCOUNT_ID }}:role/Aequitas-MAS-GitHub-CI-CD
          aws-region: ${{ env.TF_VAR_AQM_REGION }}

      # 3. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"

      # 4. Initialize with Dynamic Backend
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=aqm-terraform-state-${{ steps.context.outputs.ACCOUNT_ID }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.TF_VAR_AQM_REGION }}" \
            -backend-config="dynamodb_table=aqm-terraform-state-lock"

      # 5. Workspace Selection (Native implementation for idempotency)
      - name: Select Workspace
        run: terraform workspace select -or-create ${{ steps.context.outputs.WORKSPACE }}

      # 6. Validation and Planning
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -no-color

      # 7. Controlled Deployment is intentionally disabled in this development stage.
